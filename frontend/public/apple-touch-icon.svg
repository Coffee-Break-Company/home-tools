<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 100 100">
  <defs>
    <!-- iOS 26 dark icon: charcoal vertical gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a3c"/>
      <stop offset="0.55" stop-color="#252527"/>
      <stop offset="1" stop-color="#161618"/>
    </linearGradient>
    <!-- soft specular highlight from the top -->
    <radialGradient id="spec" cx="0.5" cy="0" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- glyph gets a faint top-to-bottom falloff like rendered icons -->
    <linearGradient id="glyph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e4e4e8"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" fill="url(#bg)"/>
  <rect width="100" height="100" fill="url(#spec)"/>
  <!-- 1px inner top-edge highlight for the glass pop -->
  <rect x="0.5" y="0.5" width="99" height="99" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <g transform="translate(22 21)" stroke="url(#glyph)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M4 24 L28 4 L52 24 V52 a4 4 0 0 1 -4 4 H8 a4 4 0 0 1 -4 -4 Z"/>
    <path d="M20 56 V36 h16 v20"/>
  </g>
</svg>
