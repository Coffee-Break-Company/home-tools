name: Bill Reminder

on:
  schedule:
    # 10:37 UTC ≈ 07:37 BRT, daily — off the top of the hour to dodge scheduler load
    - cron: "37 10 * * *"
  workflow_dispatch:

jobs:
  scan:
    name: Scan due bills
    runs-on: ubuntu-latest

    steps:
      - name: Trigger daily scan
        run: |
          curl --fail --show-error --silent \
            --retry 3 --retry-all-errors --max-time 120 \
            -X POST "${{ secrets.API_URL }}/api/cron/scan" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}"
